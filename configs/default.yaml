project_name: Early CVD Prediction
random_seed: 42

paths:
  primary_raw: data/raw/heart_disease_uci.csv
  secondary_raw: data/raw/heart.csv
  artifacts_dir: artifacts
  reports_dir: reports
  figures_dir: reports/figures
  tables_dir: reports/tables
  manuscript_dir: reports/manuscript
  mlruns_dir: mlruns
  model_bundle: artifacts/model_bundle.joblib

validation:
  group_column: center
  threshold: 0.5
  bootstrap_iterations: 200
  thresholds: [0.10, 0.20, 0.30, 0.40, 0.50, 0.60, 0.70, 0.80, 0.90]
  outer_strategy: leave_one_center_out
  inner_strategy: group_k_fold

models:
  include:
    - logistic_l2
    - random_forest
    - gradient_boosting
    - calibrated_gradient_boosting
    - mlp_notebook_baseline

reporting:
  positive_label: heart disease present
  caution: This is a research prototype trained on public benchmark data and is not a clinical diagnostic device.

